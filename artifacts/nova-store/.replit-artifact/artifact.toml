kind = "web"
previewPath = "/"
title = "NOVA Store"
version = "1.0.0"
id = "artifacts/nova-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25391
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/nova-store run dev"

[services.env]
PORT = "25391"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/nova-store", "run", "build"]
publicDir = "artifacts/nova-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
